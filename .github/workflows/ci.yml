  fuzz-tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/fuzz-ci:latest
    env:
      SIMPLER_ROOT: ${{ github.workspace }}/simpler
      FUZZ_THRESHOLD: "0.7"
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }

      - name: Install project
        run: |
          [ -d "$SIMPLER_ROOT/.git" ] || git clone https://github.com/ChaoWao/simpler "$SIMPLER_ROOT"
          git clone https://github.com/ChaoWao/pto-isa "$SIMPLER_ROOT/examples/scripts/_deps/pto-isa" 2>/dev/null || true
          pip install -e .[dev] pytest-xdist -q

      - name: Run fuzz tests
        run: |
          python tests/st/fuzz/generate_test.py --num-cases 10

          run_suite() {
            rm -rf build/fuzz-artifacts && mkdir -p build/fuzz-artifacts/sim
            pytest tests/st/fuzz/generated/test_fuzz_multi_kernel.py \
              -v --save-kernels --dump-passes \
              --kernels-dir=build/fuzz-artifacts/sim \
              --platform=a2a3sim -n auto \
              --junitxml=fuzz-results-sim.xml || true
            python tests/st/fuzz/check_pass_rate.py \
              fuzz-results-sim.xml --threshold "$FUZZ_THRESHOLD"
          }

          run_suite && exit 0
          echo "Retry with stable simpler..."
          cd "$SIMPLER_ROOT" && git fetch origin stable && git checkout stable && cd -
          run_suite

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ github.run_id }}
          path: |
            fuzz-results-sim.xml
            build/fuzz-artifacts/
            tests/st/fuzz/generated/
          retention-days: 7
